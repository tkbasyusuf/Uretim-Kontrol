<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Depo Stok</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #f4f3ef; --card: #fff; --border: #e2e0d8;
  --text: #1a1916; --muted: #7a7870; --accent: #1a1916;
  --ok: #2d6a4f; --ok-bg: #d8f3dc;
  --warn: #7d4e00; --warn-bg: #ffe8a1;
  --danger: #9b1c1c; --danger-bg: #fde8e8;
  --r: 12px; --font: Georgia, serif; --mono: "Courier New", monospace;
}
body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

/* LOGIN */
.login-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 2rem 1.5rem; }
.login-wrap h1 { font-size: 2rem; font-weight: normal; margin-bottom: 6px; }
.login-wrap p { font-size: 0.9rem; color: var(--muted); font-style: italic; margin-bottom: 2.5rem; }
.login-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); padding: 1.75rem; width: 100%; max-width: 360px; }
.lbl { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 7px; }
.inp { width: 100%; padding: 13px 15px; font-size: 1rem; font-family: var(--font); border: 1px solid var(--border); border-radius: 9px; background: var(--bg); color: var(--text); outline: none; margin-bottom: 14px; }
.inp:focus { border-color: var(--accent); }
.btn-blk { width: 100%; padding: 14px; font-size: 1rem; font-family: var(--font); background: var(--accent); color: #fff; border: none; border-radius: 9px; cursor: pointer; }
.btn-blk:disabled { opacity: 0.5; cursor: not-allowed; }
.login-msg { text-align: center; font-size: 0.82rem; margin-top: 10px; min-height: 20px; }

/* LAYOUT */
#app { display: none; }
.topbar { background: var(--card); border-bottom: 1px solid var(--border); padding: 12px 16px; display: flex; align-items: center; position: sticky; top: 0; z-index: 10; }
.topbar-title { font-size: 1rem; flex: 1; }
.topbar-op { font-size: 0.75rem; color: var(--muted); font-style: italic; margin-right: 10px; }
.btn-sm { padding: 5px 12px; font-size: 0.75rem; font-family: var(--font); border: 1px solid var(--border); border-radius: 7px; background: transparent; cursor: pointer; color: var(--muted); }

/* TABS */
.tabs { display: grid; grid-template-columns: repeat(3, 1fr); background: var(--card); border-bottom: 1px solid var(--border); }
.tab { padding: 11px 8px; text-align: center; font-size: 0.78rem; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; font-family: var(--font); background: none; border-top: none; border-left: none; border-right: none; }
.tab.on { color: var(--text); border-bottom-color: var(--text); }

.content { padding: 14px; max-width: 700px; margin: 0 auto; }
.panel { display: none; }
.panel.on { display: block; }

/* CARD */
.card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 12px; overflow: hidden; }
.card-head { padding: 13px 15px; border-bottom: 1px solid var(--border); font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); font-weight: normal; }

/* SEARCH */
.search-wrap { position: relative; margin-bottom: 10px; }
.search-inp { width: 100%; padding: 13px 40px 13px 15px; font-size: 1rem; font-family: var(--font); border: 1.5px solid var(--border); border-radius: 10px; background: var(--bg); color: var(--text); outline: none; }
.search-inp:focus { border-color: var(--accent); }
.search-x { position: absolute; right: 11px; top: 50%; transform: translateY(-50%); background: none; border: none; font-size: 1.1rem; cursor: pointer; color: var(--muted); display: none; }
.sugg { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); margin-bottom: 10px; display: none; overflow: hidden; }
.sugg-item { padding: 12px 15px; border-bottom: 1px solid var(--border); cursor: pointer; }
.sugg-item:last-child { border-bottom: none; }
.sugg-item:active { background: var(--bg); }
.sugg-name { font-size: 0.87rem; line-height: 1.4; }
.sugg-sub { font-size: 0.71rem; color: var(--muted); font-family: var(--mono); margin-top: 2px; }
.tag { display: inline-block; font-size: 0.65rem; background: #e8f4fd; color: #1a6496; padding: 1px 6px; border-radius: 4px; margin-left: 5px; }

/* DETAY KART */
.det-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 12px; }
.det-head { padding: 14px 15px; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.det-name { font-size: 0.92rem; line-height: 1.5; flex: 1; }
.pill { flex-shrink: 0; padding: 3px 11px; border-radius: 20px; font-size: 0.72rem; font-weight: bold; }
.pill-ok { background: var(--ok-bg); color: var(--ok); }
.pill-warn { background: var(--warn-bg); color: var(--warn); }
.pill-crit { background: var(--danger-bg); color: var(--danger); }
.stok-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border-bottom: 1px solid var(--border); }
.stok-cell { background: var(--card); padding: 13px; text-align: center; }
.stok-lbl { font-size: 0.67rem; text-transform: uppercase; letter-spacing: 1px; color: var(--muted); margin-bottom: 4px; }
.stok-val { font-size: 1.85rem; line-height: 1; }
.stok-unit { font-size: 0.71rem; color: var(--muted); margin-top: 3px; }
.det-rows { padding: 0 15px; }
.det-row { display: flex; justify-content: space-between; align-items: baseline; padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 0.87rem; gap: 12px; }
.det-row:last-child { border-bottom: none; }
.det-lbl { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.8px; color: var(--muted); white-space: nowrap; }
.det-val { color: var(--text); text-align: right; word-break: break-word; }
.det-val.mono { font-family: var(--mono); font-size: 0.77rem; }

/* AĞIRLIK HESAP */
.agir-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--r); overflow: hidden; margin-bottom: 12px; }
.agir-body { padding: 14px; }
.agir-row { display: flex; gap: 10px; align-items: center; }
.agir-inp { flex: 1; padding: 11px 13px; font-size: 1rem; font-family: var(--font); border: 1.5px solid var(--border); border-radius: 9px; background: var(--bg); color: var(--text); outline: none; }
.agir-res { margin-top: 11px; padding: 13px; background: var(--bg); border-radius: 9px; text-align: center; display: none; }
.agir-val { font-size: 1.6rem; }
.agir-sub { font-size: 0.71rem; color: var(--muted); margin-top: 3px; font-style: italic; }

/* GİRİŞ/ÇIKIŞ FORM */
.fgrp { margin-bottom: 13px; }
.fgrp .lbl { margin-bottom: 6px; }
.frow { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.sku-info { font-size: 0.8rem; color: var(--muted); font-style: italic; margin: -7px 0 11px 2px; min-height: 18px; }
.sku-info.err { color: var(--danger); }
select.inp { appearance: none; -webkit-appearance: none; }
.btn-giris { width: 100%; padding: 13px; font-size: 0.93rem; font-family: var(--font); background: var(--ok-bg); color: var(--ok); border: 1px solid var(--ok); border-radius: 9px; cursor: pointer; font-weight: bold; margin-top: 4px; }
.btn-cikis { width: 100%; padding: 13px; font-size: 0.93rem; font-family: var(--font); background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger); border-radius: 9px; cursor: pointer; font-weight: bold; margin-top: 8px; }
.btn-giris:disabled, .btn-cikis:disabled { opacity: 0.45; cursor: not-allowed; }
.btn-giris:active, .btn-cikis:active { opacity: 0.8; }

/* TOPLU */
.toplu-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.toplu-btn { padding: 11px; font-size: 0.83rem; font-family: var(--font); border: 1px solid var(--border); border-radius: 9px; background: var(--bg); cursor: pointer; color: var(--muted); text-align: center; }
.toplu-btn.on { background: var(--accent); color: #fff; border-color: var(--accent); }
.upload-area { border: 2px dashed var(--border); border-radius: var(--r); padding: 1.75rem; text-align: center; cursor: pointer; margin-bottom: 12px; transition: border-color 0.2s; }
.upload-area:hover { border-color: var(--accent); }
.upload-icon { font-size: 1.9rem; margin-bottom: 7px; }
.upload-txt { font-size: 0.85rem; color: var(--muted); font-style: italic; }
#fileInput { display: none; }
.prev-wrap { margin-bottom: 12px; }
.prev-count { font-size: 0.77rem; color: var(--muted); margin-bottom: 7px; }
.prev-item { display: flex; justify-content: space-between; align-items: center; padding: 9px 13px; border-bottom: 1px solid var(--border); font-size: 0.82rem; background: var(--card); }
.prev-item:last-child { border-bottom: none; }
.prev-item.err { background: var(--danger-bg); }
.prev-sku { font-family: var(--mono); font-size: 0.71rem; color: var(--muted); margin-top: 2px; }
.prev-miktar { font-weight: bold; white-space: nowrap; }
.btn-toplu-giris { width: 100%; padding: 13px; font-size: 0.93rem; font-family: var(--font); background: var(--ok-bg); color: var(--ok); border: 1px solid var(--ok); border-radius: 9px; cursor: pointer; font-weight: bold; display: none; }
.btn-toplu-cikis { width: 100%; padding: 13px; font-size: 0.93rem; font-family: var(--font); background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger); border-radius: 9px; cursor: pointer; font-weight: bold; margin-top: 8px; display: none; }

/* UYARILAR */
.ozet-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.ozet-cell { border-radius: var(--r); padding: 14px; text-align: center; }
.ozet-num { font-size: 1.8rem; font-weight: bold; line-height: 1; }
.ozet-lbl { font-size: 0.67rem; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
.rapor-btns { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
.btn-rapor-all { padding: 12px; font-size: 0.82rem; font-family: var(--font); background: var(--accent); color: #fff; border: none; border-radius: 9px; cursor: pointer; }
.btn-rapor-crit { padding: 12px; font-size: 0.82rem; font-family: var(--font); background: var(--danger-bg); color: var(--danger); border: 1px solid var(--danger); border-radius: 9px; cursor: pointer; }
.warn-item { background: var(--card); border: 1px solid var(--border); border-radius: 9px; padding: 11px 14px; margin-bottom: 9px; }
.warn-item.crit { background: var(--danger-bg); border-color: #e57373; }
.warn-item.warn { background: var(--warn-bg); border-color: #f0c040; }
.warn-name { font-size: 0.83rem; font-weight: bold; }
.warn-sku { font-size: 0.71rem; font-family: var(--mono); color: var(--muted); margin-top: 2px; }
.warn-stok { font-size: 0.8rem; margin-top: 4px; }
.sec-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; margin: 14px 0 8px; padding: 0 2px; }

/* EMPTY / TOAST */
.empty { text-align: center; padding: 2.5rem 1rem; color: var(--muted); }
.empty-icon { font-size: 2rem; margin-bottom: 8px; }
.empty-txt { font-size: 0.88rem; font-style: italic; }
.toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); padding: 11px 20px; border-radius: 9px; font-size: 0.87rem; z-index: 999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; background: var(--text); color: #fff; }
.toast.show { opacity: 1; }
.toast.ok { background: var(--ok); }
.toast.err { background: var(--danger); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login-wrap">
  <h1>Depo Stok</h1>
  <p>Hammadde yönetim sistemi</p>
  <div class="login-card">
    <label class="lbl" for="opInp">Operatör adı</label>
    <input class="inp" id="opInp" type="text" placeholder="Adınızı girin..." autocomplete="off" />
    <button class="btn-blk" id="loginBtn" onclick="girisYap()">Giriş</button>
    <div class="login-msg" id="loginMsg"></div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <span class="topbar-title">Depo Stok</span>
    <span class="topbar-op" id="opTag"></span>
    <button class="btn-sm" onclick="cikisYap()">Çıkış</button>
  </div>
  <div class="tabs">
    <button class="tab on" onclick="sekme('sorgula',this)">Sorgula</button>
    <button class="tab" onclick="sekme('hareket',this)">Giriş / Çıkış</button>
    <button class="tab" onclick="sekme('uyarilar',this)">Uyarılar</button>
  </div>
  <div class="content">

    <!-- SORGULA -->
    <div class="panel on" id="p-sorgula">
      <div class="search-wrap">
        <input class="search-inp" id="searchInp" placeholder="SKU veya Depo kodu girin..." autocomplete="off" oninput="aramaYap()" onkeydown="aramaKey(event)" />
        <button class="search-x" id="searchX" onclick="aramaSil()">✕</button>
      </div>
      <div id="sugg" class="sugg"></div>
      <div id="detayArea">
        <div class="empty"><div class="empty-icon">🔎</div><div class="empty-txt">SKU veya Depo kodu ile arayın</div></div>
      </div>
    </div>

    <!-- GİRİŞ / ÇIKIŞ -->
    <div class="panel" id="p-hareket">
      <!-- Tekli işlem -->
      <div class="card">
        <div class="card-head">Stok Hareketi</div>
        <div style="padding:14px">
          <div class="fgrp">
            <label class="lbl">SKU / Depo Kodu</label>
            <input class="inp" id="hSku" placeholder="Kod girin..." autocomplete="off" oninput="hSkuAra()" style="margin-bottom:0" />
            <div class="sku-info" id="hSkuInfo"></div>
          </div>
          <div class="frow">
            <div class="fgrp">
              <label class="lbl">Miktar</label>
              <input class="inp" id="hMiktar" type="number" placeholder="0" min="1" style="margin-bottom:0" />
            </div>
            <div class="fgrp">
              <label class="lbl">İşlem Türü</label>
              <select class="inp" id="hTur" onchange="hTurDegis()" style="margin-bottom:0">
                <option value="g_tedarikciden">📥 Giriş: Tedarikçiden</option>
                <option value="g_iade">📥 Giriş: İade / Düzeltme</option>
                <option value="c_uretim">📤 Çıkış: Üretime</option>
                <option value="c_uretim_disi">📤 Çıkış: Üretim Dışı</option>
                <option value="c_fire">📤 Çıkış: Fire / Hasar</option>
              </select>
            </div>
          </div>
          <!-- Giriş alanları -->
          <div id="girisAlanlar">
            <div class="frow">
              <div class="fgrp">
                <label class="lbl">Tedarikçi</label>
                <input class="inp" id="hTedarikci" placeholder="Tedarikçi adı..." style="margin-bottom:0" />
              </div>
              <div class="fgrp">
                <label class="lbl">İrsaliye / Fatura No</label>
                <input class="inp" id="hBelge" placeholder="İrsaliye no..." style="margin-bottom:0" />
              </div>
            </div>
          </div>
          <!-- Çıkış alanları -->
          <div id="cikisAlanlar" style="display:none">
            <div id="uretimAlan">
              <div class="frow">
                <div class="fgrp">
                  <label class="lbl">İş Emri / Üretim No</label>
                  <input class="inp" id="hUretimNo" placeholder="UE-2026-001" style="margin-bottom:0" />
                </div>
                <div class="fgrp">
                  <label class="lbl">Ürün Adı</label>
                  <input class="inp" id="hUrunAdi" placeholder="Ürün adı..." style="margin-bottom:0" />
                </div>
              </div>
            </div>
            <div id="disiAlan" style="display:none">
              <div class="fgrp">
                <label class="lbl">Sebep</label>
                <input class="inp" id="hSebep" placeholder="Bakım, numune, fire..." style="margin-bottom:0" />
              </div>
            </div>
          </div>
          <div class="fgrp" style="margin-top:12px">
            <label class="lbl">Not (opsiyonel)</label>
            <input class="inp" id="hNot" placeholder="Ek açıklama..." style="margin-bottom:0" />
          </div>
          <button class="btn-giris" id="btnGiris" onclick="stokGiris()" disabled>+ Stok Girişi</button>
          <button class="btn-cikis" id="btnCikis" onclick="stokCikis()" disabled style="display:none">− Stok Çıkışı</button>
        </div>
      </div>

      <!-- Toplu işlem -->
      <div class="card">
        <div class="card-head">Toplu Stok İşlemi (Excel)</div>
        <div style="padding:14px">
          <div class="toplu-tabs">
            <button class="toplu-btn on" id="tGirisBtn" onclick="topluTipSec('giris')">📥 Toplu Giriş</button>
            <button class="toplu-btn" id="tCikisBtn" onclick="topluTipSec('cikis')">📤 Toplu Çıkış</button>
          </div>
          <label for="fileInput" class="upload-area">
            <div class="upload-icon">📄</div>
            <div class="upload-txt">Buraya tıkla — Excel veya CSV seç<br><small>Sütunlar: SKU_Kodu, Miktar (+ Tedarikci, Irsaliye_No, Uretim_No vb.)</small></div>
          </label>
          <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" onchange="dosyaYukle(event)" />
          <div id="onizleme"></div>
          <button class="btn-toplu-giris" id="btnTopluGiris" onclick="topluUygula('giris')">📥 Toplu Girişi Uygula</button>
          <button class="btn-toplu-cikis" id="btnTopluCikis" onclick="topluUygula('cikis')">📤 Toplu Çıkışı Uygula</button>
        </div>
      </div>
    </div>

    <!-- UYARILAR -->
    <div class="panel" id="p-uyarilar">
      <div class="rapor-btns">
        <button class="btn-rapor-all" onclick="raporIndir('hepsi')">📥 Tüm Stok Listesi</button>
        <button class="btn-rapor-crit" onclick="raporIndir('siparis')">⚠️ Sipariş Listesi</button>
      </div>
      <div id="ozetArea"></div>
      <div id="uyariListesi"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API =  + API + ;
let operator = '';
let allData = [];
let mevcutItem = null;
let topluTip = 'giris';
let topluData = [];

// ── GİRİŞ ──
window.onload = () => {
  document.getElementById('opInp').addEventListener('keydown', e => { if(e.key==='Enter') girisYap(); });
  document.getElementById('hSku').addEventListener('keydown', e => { if(e.key==='Enter') hSkuAra(); });
};

async function girisYap() {
  const op = document.getElementById('opInp').value.trim();
  if(!op) { mesaj('loginMsg', 'Lütfen adınızı girin.', true); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Yükleniyor...';
  mesaj('loginMsg', 'Veriler yükleniyor...');
  try {
    const r = await fetch(API + '?action=getAll');
    const j = await r.json();
    if(j.success) {
      allData = j.data;
      operator = op;
      document.getElementById('opTag').textContent = op;
      document.getElementById('login').style.display = 'none';
      document.getElementById('app').style.display = 'block';
      uyarilariYukle();
    } else { mesaj('loginMsg', 'Bağlantı hatası!', true); }
  } catch(e) { mesaj('loginMsg', 'Sunucuya ulaşılamadı!', true); }
  btn.disabled = false; btn.textContent = 'Giriş';
}

function mesaj(id, txt, err=false) {
  const el = document.getElementById(id);
  el.textContent = txt;
  el.style.color = err ? 'var(--danger)' : 'var(--muted)';
}

function cikisYap() {
  document.getElementById('login').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('opInp').value = '';
  aramaSil();
}

// ── TABS ──
function sekme(id, el) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('on'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.getElementById('p-' + id).classList.add('on');
  el.classList.add('on');
  if(id === 'uyarilar') uyarilariYukle();
}

// ── ARAMA ──
function normSku(s) { return String(s||'').trim().toLowerCase(); }

function getAllCodes(item) {
  return [
    item['SKU Kodu']||item.sku||'',
    item['Depo Kodu -1']||item['Depo Kodu -1 ']||item.depo1||'',
    item['Depo Kodu -2']||item.depo2||'',
  ].filter(Boolean);
}

function aramaYap() {
  const q = document.getElementById('searchInp').value.trim();
  document.getElementById('searchX').style.display = q ? 'block' : 'none';
  if(q.length < 2) { hideSugg(); showEmpty(); return; }
  const qn = q.toLowerCase();
  const hits = allData.filter(i => getAllCodes(i).some(c => normSku(c).includes(qn))).slice(0,8);
  if(!hits.length) { hideSugg(); document.getElementById('detayArea').innerHTML = '<div class="empty"><div class="empty-icon">—</div><div class="empty-txt">Bulunamadı</div></div>'; return; }
  if(hits.length === 1) { hideSugg(); showDetay(hits[0]); return; }
  showSugg(hits, qn);
}

function aramaKey(e) {
  if(e.key !== 'Enter') return;
  const q = document.getElementById('searchInp').value.trim().toLowerCase();
  const m = allData.find(i => getAllCodes(i).some(c => normSku(c) === q));
  if(m) { hideSugg(); showDetay(m); }
}

function showSugg(items, q) {
  const el = document.getElementById('sugg');
  el.innerHTML = items.map(i => {
    const sku = i['SKU Kodu']||i.sku||'';
    const acik = i['Kalem Açıklaması']||i.aciklama||'';
    const d1 = i['Depo Kodu -1']||i['Depo Kodu -1 ']||i.depo1||'';
    const d2 = i['Depo Kodu -2']||i.depo2||'';
    let tag = '';
    if(d1 && d1.toLowerCase().includes(q)) tag = `<span class="tag">Depo-1: ${d1}</span>`;
    else if(d2 && d2.toLowerCase().includes(q)) tag = `<span class="tag">Depo-2: ${d2}</span>`;
    return `<div class="sugg-item" onclick="pickItem('${sku}')">
      <div class="sugg-name">${acik}${tag}</div>
      <div class="sugg-sub">${sku}</div>
    </div>`;
  }).join('');
  el.style.display = 'block';
  document.getElementById('detayArea').innerHTML = '';
}

function hideSugg() { document.getElementById('sugg').style.display = 'none'; }
function showEmpty() { document.getElementById('detayArea').innerHTML = '<div class="empty"><div class="empty-icon">🔎</div><div class="empty-txt">SKU veya Depo kodu ile arayın</div></div>'; }

function pickItem(sku) {
  const item = allData.find(i => String(i['SKU Kodu']||i.sku||'') === sku);
  document.getElementById('searchInp').value = sku;
  document.getElementById('searchX').style.display = 'block';
  hideSugg();
  if(item) showDetay(item);
}

function aramaSil() {
  document.getElementById('searchInp').value = '';
  document.getElementById('searchX').style.display = 'none';
  hideSugg(); showEmpty(); mevcutItem = null;
}

function durum(item) {
  const m = Number(item['Mevcut Stok']||item.stok||0);
  const mn = Number(item['Minimum Stok']||item.min_stok||0);
  return m === 0 ? 'crit' : m < mn ? 'warn' : 'ok';
}

function showDetay(item) {
  mevcutItem = item;
  const sku = item['SKU Kodu']||item.sku||'';
  const acik = item['Kalem Açıklaması']||item.aciklama||'';
  const stok = Number(item['Mevcut Stok']||item.stok||0);
  const minS = Number(item['Minimum Stok']||item.min_stok||0);
  const birim = item['Ölçü Birimi']||item.birim||'';
  const agir = Number(item['Birim Ağırlık']||item['Birim Ağırlık ( Gram)']||item.agirlik||0);
  const raf = item['Raf / Lokasyon']||item['Raf']||item.raf||'—';
  const tip = item['Malzeme Tipi']||item.tip||'—';
  const ted1 = item['Tedarikçi -1']||item.tedarikci1||'—';
  const ted2 = item['Tedarikçi -2']||item.tedarikci2||'';
  const ted = ted2 ? ted1 + ' / ' + ted2 : ted1;
  const d1 = item['Depo Kodu -1']||item['Depo Kodu -1 ']||item.depo1||'—';
  const d2 = item['Depo Kodu -2']||item.depo2||'';
  const depo = d2 ? d1 + ' / ' + d2 : d1;
  const d = durum(item);
  const pillTxt = d==='crit' ? 'Kritik' : d==='warn' ? 'Uyarı' : 'Normal';
  const pillCls = d==='crit' ? 'pill-crit' : d==='warn' ? 'pill-warn' : 'pill-ok';

  const agirSec = agir > 0 ? `
    <div class="agir-card">
      <div class="card-head">Ağırlık Bazlı Sayım</div>
      <div class="agir-body">
        <div class="agir-row">
          <input class="agir-inp" type="number" placeholder="Toplam ağırlık (gram)" id="agirInp" oninput="agirHesap()" />
          <span style="font-size:0.8rem;color:var(--muted)">gram</span>
        </div>
        <div class="agir-res" id="agirRes">
          <div class="agir-val" id="agirVal"></div>
          <div class="agir-sub" id="agirSub"></div>
        </div>
      </div>
    </div>` : '';

  document.getElementById('detayArea').innerHTML = `
    <div class="det-card">
      <div class="det-head">
        <div class="det-name">${acik}</div>
        <span class="pill ${pillCls}">${pillTxt}</span>
      </div>
      <div class="stok-grid">
        <div class="stok-cell">
          <div class="stok-lbl">Mevcut Stok</div>
          <div class="stok-val">${stok.toLocaleString()}</div>
          <div class="stok-unit">${birim}</div>
        </div>
        <div class="stok-cell">
          <div class="stok-lbl">Minimum Stok</div>
          <div class="stok-val">${minS}</div>
          <div class="stok-unit">${birim}</div>
        </div>
      </div>
      <div class="det-rows">
        <div class="det-row"><span class="det-lbl">SKU Kodu</span><span class="det-val mono">${sku}</span></div>
        <div class="det-row"><span class="det-lbl">Depo Kodu</span><span class="det-val mono">${depo}</span></div>
        <div class="det-row"><span class="det-lbl">Malzeme Tipi</span><span class="det-val">${tip}</span></div>
        <div class="det-row"><span class="det-lbl">Ölçü Birimi</span><span class="det-val">${birim}</span></div>
        <div class="det-row"><span class="det-lbl">Birim Ağırlık</span><span class="det-val">${agir} gr</span></div>
        <div class="det-row"><span class="det-lbl">Raf / Lokasyon</span><span class="det-val">${raf}</span></div>
        <div class="det-row"><span class="det-lbl">Tedarikçi</span><span class="det-val">${ted}</span></div>
      </div>
    </div>
    ${agirSec}`;
}

function agirHesap() {
  if(!mevcutItem) return;
  const agir = Number(mevcutItem['Birim Ağırlık']||mevcutItem['Birim Ağırlık ( Gram)']||mevcutItem.agirlik||0);
  const tw = parseFloat(document.getElementById('agirInp').value);
  const res = document.getElementById('agirRes');
  if(!tw || tw <= 0 || agir <= 0) { res.style.display='none'; return; }
  const qty = Math.round(tw / agir);
  const birim = mevcutItem['Ölçü Birimi']||mevcutItem.birim||'';
  document.getElementById('agirVal').textContent = qty.toLocaleString() + ' ' + birim;
  document.getElementById('agirSub').textContent = 'tahmini adet';
  res.style.display = 'block';
}

// ── SKU ARA (Hareket) ──
function hSkuAra() {
  const q = document.getElementById('hSku').value.trim();
  const info = document.getElementById('hSkuInfo');
  const bg = document.getElementById('btnGiris');
  const bc = document.getElementById('btnCikis');
  document.getElementById('hSku').dataset.rsku = '';
  if(!q) { info.textContent=''; bg.disabled=true; bc.disabled=true; return; }
  const qn = q.toLowerCase();
  const item = allData.find(i => getAllCodes(i).some(c => normSku(c) === qn));
  if(item) {
    const rsku = item['SKU Kodu']||item.sku||'';
    document.getElementById('hSku').dataset.rsku = rsku;
    const stok = Number(item['Mevcut Stok']||item.stok||0);
    const birim = item['Ölçü Birimi']||item.birim||'';
    const acik = item['Kalem Açıklaması']||item.aciklama||'';
    info.textContent = acik + ' — Mevcut: ' + stok.toLocaleString() + ' ' + birim;
    info.className = 'sku-info';
    bg.disabled = false; bc.disabled = false;
  } else {
    info.textContent = 'Bulunamadı';
    info.className = 'sku-info err';
    bg.disabled = true; bc.disabled = true;
  }
}

// ── STOK GİRİŞ ──
async function stokGiris() {
  const rsku = document.getElementById('hSku').dataset.rsku || document.getElementById('hSku').value.trim();
  const miktar = parseFloat(document.getElementById('hMiktar').value);
  if(!rsku || !miktar || miktar<=0) { toast('SKU ve miktar zorunlu!', 'err'); return; }
  const t = document.getElementById('hTur').value;
  const ted = document.getElementById('hTedarikci').value.trim();
  const belge = document.getElementById('hBelge').value.trim();
  const not_ = document.getElementById('hNot').value.trim();
  let not = t==='g_tedarikciden' ? 'Tedarikçi Girişi' : 'İade/Düzeltme';
  if(ted) not += ' | Tedarikçi: '+ted;
  if(belge) not += ' | Belge: '+belge;
  if(not_) not += ' | '+not_;
  const btn = document.getElementById('btnGiris');
  btn.disabled=true; btn.textContent='Kaydediliyor...';
  try {
    const r = await fetch(API, {method:'POST', body:JSON.stringify({action:'giris',sku:rsku,miktar,operator,not})});
    const j = await r.json();
    if(j.success) {
      const item = allData.find(i => String(i['SKU Kodu']||i.sku||'')===rsku);
      if(item) { if(item['Mevcut Stok']!==undefined) item['Mevcut Stok']=j.yeniStok; else item.stok=j.yeniStok; }
      toast('✓ Giriş kaydedildi! Yeni stok: '+j.yeniStok, 'ok');
      temizleForm();
    } else { toast(j.error||'Hata!', 'err'); }
  } catch(e) { toast('Bağlantı hatası!', 'err'); }
  btn.disabled=false; btn.textContent='+ Stok Girişi';
}

// ── STOK ÇIKIŞ ──

  const rsku = document.getElementById('hSku').dataset.rsku || document.getElementById('hSku').value.trim();
  const miktar = parseFloat(document.getElementById('hMiktar').value);
  if(!rsku || !miktar || miktar<=0) { toast('SKU ve miktar zorunlu!', 'err'); return; }

  const not_ = document.getElementById('hNot').value.trim();
  let not = '';
  if(t==='c_uretim') {
    const ue = document.getElementById('hUretimNo').value.trim();
    const ua = document.getElementById('hUrunAdi').value.trim();
    not = 'Üretim Çıkışı';
    if(ue) not += ' | İş Emri: '+ue;
    if(ua) not += ' | Ürün: '+ua;
  } else if(t==='c_uretim_disi') {
    const s = document.getElementById('hSebep').value.trim();
    not = 'Üretim Dışı Çıkış';
    if(s) not += ' | '+s;
  } else {
    const s = document.getElementById('hSebep').value.trim();
    not = 'Fire/Hasar';

  }
  if(not_) not += ' | '+not_;
  const btn = document.getElementById('btnCikis');
  btn.disabled=true; btn.textContent='Kaydediliyor...';
  try {
    const r = await fetch(API, {method:'POST', body:JSON.stringify({action:'cikis',sku:rsku,miktar,operator,not})});
    const j = await r.json();
    if(j.success) {
      const item = allData.find(i => String(i['SKU Kodu']||i.sku||'')===rsku);
      if(item) { if(item['Mevcut Stok']!==undefined) item['Mevcut Stok']=j.yeniStok; else item.stok=j.yeniStok; }

function temizleForm() {
  ['hMiktar','hTedarikci','hBelge','hUretimNo','hUrunAdi','hSebep','hNot'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.value='';
  });

}

// ── TOPLU İŞLEM ──
function topluTipSec(tip) {
  topluTip = tip;
  document.getElementById('tGirisBtn').classList.toggle('on', tip==='giris');
  document.getElementById('tCikisBtn').classList.toggle('on', tip==='cikis');
  document.getElementById('btnTopluGiris').style.display = 'none';
  document.getElementById('btnTopluCikis').style.display = 'none';
  if(topluData.length) onizleGoster();
}

function dosyaYukle(event) {
  const file = event.target.files[0];
  if(!file) return;
  const ext = file.name.split('.').pop().toLowerCase();
  if(ext==='csv') {
    const r = new FileReader();
    r.onload = e => csvParse(e.target.result);
    r.readAsText(file, 'UTF-8');
  } else if(ext==='xlsx'||ext==='xls') {
    const r = new FileReader();
    r.onload = e => {
      try {
        const wb = XLSX.read(new Uint8Array(e.target.result), {type:'array'});
        const ws = wb.Sheets[wb.SheetNames[0]];
        rowsParse(XLSX.utils.sheet_to_json(ws, {header:1}));
      } catch(err) { toast('Excel okuma hatası!', 'err'); }
    };
    r.readAsArrayBuffer(file);
  } else { toast('CSV veya Excel yükleyin!', 'err'); }
}

function csvParse(text) {
  const lines = text.split(/?
/).filter(l => l.trim());
  rowsParse(lines.map(l => l.split(',').map(c => c.trim().replace(/^"|"$/g,''))));
}

function rowsParse(rows) {
  if(!rows || rows.length<2) { toast('Dosyada veri bulunamadı!', 'err'); return; }
  const hdr = rows[0].map(h => String(h||'').toLowerCase().trim());
  const si = hdr.findIndex(h => h.includes('sku')||h.includes('kod'));
  const mi = hdr.findIndex(h => h.includes('miktar')||h.includes('adet'));
  const ti = hdr.findIndex(h => h.includes('tedarik'));
  const ii = hdr.findIndex(h => h.includes('irsali')||h.includes('fatura'));
  const ui = hdr.findIndex(h => h.includes('uretim')||h.includes('üretim')||h.includes('iş'));
  const ai = hdr.findIndex(h => h.includes('urun')||h.includes('ürün'));
  const ni = hdr.findIndex(h => h.includes('not')||h.includes('sebep'));
  const skuIdx = si>=0 ? si : 0;
  const mikIdx = mi>=0 ? mi : 1;
  topluData = [];
  for(let i=1; i<rows.length; i++) {
    const cols = rows[i];
    if(!cols||cols.length<2) continue;
    const sku = String(cols[skuIdx]||'').trim();
    if(!sku) continue;
    const mVal = cols[mikIdx];
    const miktar = typeof mVal==='number' ? mVal : parseFloat(String(mVal||'').replace(',','.'));
    if(isNaN(miktar)||miktar<=0) continue;
    const skuN = sku.toLowerCase();
    const found = allData.find(it => getAllCodes(it).some(c => normSku(c)===skuN));
    topluData.push({
      sku, miktar, found: !!found,
      ex: {
        tedarikci: ti>=0 ? String(cols[ti]||'').trim() : '',
        irsaliye:  ii>=0 ? String(cols[ii]||'').trim() : '',
        uretimNo:  ui>=0 ? String(cols[ui]||'').trim() : '',
        urunAdi:   ai>=0 ? String(cols[ai]||'').trim() : '',
        sebep:     ni>=0 ? String(cols[ni]||'').trim() : '',
      }
    });
  }
  if(!topluData.length) { toast('Geçerli veri bulunamadı!', 'err'); return; }
  onizleGoster();
}

function onizleGoster() {
  const isim = topluTip==='giris' ? '+' : '-';
  const renk = topluTip==='giris' ? 'var(--ok)' : 'var(--danger)';
  let html = '<div class="card"><div style="border-radius:var(--r);overflow:hidden">';
  topluData.forEach(d => {
    const found = allData.find(it => getAllCodes(it).some(c => normSku(c)===d.sku.toLowerCase()));
    const acik = found ? (found['Kalem Açıklaması']||found.aciklama||d.sku) : 'SKU bulunamadı';
    html += `<div class="prev-item ${!d.found?'err':''}">
      <div><div>${acik}</div><div class="prev-sku">${d.sku}</div></div>
      <div class="prev-miktar" style="color:${renk}">${isim}${d.miktar}</div>
    </div>`;
  });
  html += '</div></div>';
  const gecerli = topluData.filter(d=>d.found).length;
  document.getElementById('onizleme').innerHTML = `<div class="prev-count">${gecerli} geçerli / ${topluData.length} toplam kayıt</div>` + html;
  const ok = gecerli > 0;
  document.getElementById('btnTopluGiris').style.display = ok&&topluTip==='giris' ? 'block' : 'none';
  document.getElementById('btnTopluCikis').style.display = ok&&topluTip==='cikis' ? 'block' : 'none';
}

async function topluUygula(tip) {
  const liste = topluData.filter(d=>d.found);
  if(!liste.length) { toast('Geçerli kayıt yok!', 'err'); return; }
  toast('İşleniyor...', '');
  let ok=0;
  for(const d of liste) {
    try {
      const found = allData.find(it => getAllCodes(it).some(c => normSku(c)===d.sku.toLowerCase()));
      const rsku = found ? (found['SKU Kodu']||found.sku||d.sku) : d.sku;
      let not = tip==='giris' ? 'Toplu Giriş' : 'Toplu Çıkış';
      if(d.ex.tedarikci) not += ' | Tedarikçi: '+d.ex.tedarikci;
      if(d.ex.irsaliye)  not += ' | İrsaliye: '+d.ex.irsaliye;
      if(d.ex.uretimNo)  not += ' | Üretim No: '+d.ex.uretimNo;
      if(d.ex.urunAdi)   not += ' | Ürün: '+d.ex.urunAdi;
      if(d.ex.sebep)     not += ' | Sebep: '+d.ex.sebep;
      const r = await fetch(API, {method:'POST', body:JSON.stringify({action:tip,sku:rsku,miktar:d.miktar,operator,not})});
      const j = await r.json();
      if(j.success) {
        if(found) { if(found['Mevcut Stok']!==undefined) found['Mevcut Stok']=j.yeniStok; else found.stok=j.yeniStok; }
        ok++;
      }
    } catch(e) {}
  }
  const isimTR = tip==='giris' ? 'giriş' : 'çıkış';
  toast(`✓ ${ok}/${liste.length} ${isimTR} kaydedildi`, 'ok');
  document.getElementById('onizleme').innerHTML = '';
  document.getElementById('btnTopluGiris').style.display = 'none';
  document.getElementById('btnTopluCikis').style.display = 'none';
  document.getElementById('fileInput').value = '';
  topluData = [];
}

// ── UYARILAR ──
function uyarilariYukle() {
  const kritik = allData.filter(i => Number(i['Mevcut Stok']||i.stok||0)===0);
  const uyari  = allData.filter(i => { const m=Number(i['Mevcut Stok']||i.stok||0); const mn=Number(i['Minimum Stok']||i.min_stok||0); return m>0&&m<mn; });
  const normal = allData.length - kritik.length - uyari.length;

  document.getElementById('ozetArea').innerHTML = `
    <div class="ozet-grid">
      <div class="ozet-cell" style="background:var(--danger-bg);border:1px solid #e57373">
        <div class="ozet-num" style="color:var(--danger)">${kritik.length}</div>
        <div class="ozet-lbl" style="color:var(--danger)">Kritik</div>
      </div>
      <div class="ozet-cell" style="background:var(--warn-bg);border:1px solid #f0c040">
        <div class="ozet-num" style="color:var(--warn)">${uyari.length}</div>
        <div class="ozet-lbl" style="color:var(--warn)">Uyarı</div>
      </div>
      <div class="ozet-cell" style="background:var(--ok-bg);border:1px solid #81c784">
        <div class="ozet-num" style="color:var(--ok)">${normal}</div>
        <div class="ozet-lbl" style="color:var(--ok)">Normal</div>
      </div>
    </div>`;

  if(!kritik.length && !uyari.length) {
    document.getElementById('uyariListesi').innerHTML = '<div class="empty"><div class="empty-icon">✓</div><div class="empty-txt">Tüm stoklar normal seviyede</div></div>';
    return;
  }
  let html = '';
  if(kritik.length) {
    html += `<div class="sec-title" style="color:var(--danger)">Kritik — Stok Sıfır (${kritik.length})</div>`;
    kritik.forEach(i => {
      const sku=i['SKU Kodu']||i.sku||'';
      const acik=i['Kalem Açıklaması']||i.aciklama||'';
      const mn=Number(i['Minimum Stok']||i.min_stok||0);
      const birim=i['Ölçü Birimi']||i.birim||'';
      html += `<div class="warn-item crit"><div class="warn-name">${acik}</div><div class="warn-sku">${sku}</div><div class="warn-stok" style="color:var(--danger)">Stok: 0 · Min: ${mn} ${birim}</div></div>`;
    });
  }
  if(uyari.length) {
    html += `<div class="sec-title" style="color:var(--warn)">Uyarı — Minimum Altı (${uyari.length})</div>`;
    uyari.forEach(i => {
      const sku=i['SKU Kodu']||i.sku||'';
      const acik=i['Kalem Açıklaması']||i.aciklama||'';
      const m=Number(i['Mevcut Stok']||i.stok||0);
      const mn=Number(i['Minimum Stok']||i.min_stok||0);
      const birim=i['Ölçü Birimi']||i.birim||'';
      html += `<div class="warn-item warn"><div class="warn-name">${acik}</div><div class="warn-sku">${sku}</div><div class="warn-stok" style="color:var(--warn)">Stok: ${m.toLocaleString()} · Min: ${mn} ${birim}</div></div>`;
    });
  }
  document.getElementById('uyariListesi').innerHTML = html;
}

// ── RAPOR İNDİR ──
function raporIndir(tip) {
  let liste = tip==='siparis'
    ? allData.filter(i => Number(i['Mevcut Stok']||i.stok||0) < Number(i['Minimum Stok']||i.min_stok||0))
    : allData;
  if(!liste.length) { toast('Sipariş gerektiren kalem yok!', 'ok'); return; }
  const rows = [['SKU Kodu','Kalem Açıklaması','Tedarikçi -1','Tedarikçi -2','Depo Kodu -1','Depo Kodu -2','Malzeme Tipi','Ölçü Birimi','Birim Ağırlık (gr)','Raf / Lokasyon','Mevcut Stok','Minimum Stok','Durum']];
  liste.forEach(i => {
    const m=Number(i['Mevcut Stok']||i.stok||0);
    const mn=Number(i['Minimum Stok']||i.min_stok||0);
    rows.push([
      i['SKU Kodu']||i.sku||'',
      i['Kalem Açıklaması']||i.aciklama||'',
      i['Tedarikçi -1']||i.tedarikci1||'',
      i['Tedarikçi -2']||i.tedarikci2||'',
      i['Depo Kodu -1']||i['Depo Kodu -1 ']||i.depo1||'',
      i['Depo Kodu -2']||i.depo2||'',
      i['Malzeme Tipi']||i.tip||'',
      i['Ölçü Birimi']||i.birim||'',
      i['Birim Ağırlık']||i['Birim Ağırlık ( Gram)']||i.agirlik||0,
      i['Raf / Lokasyon']||i['Raf']||i.raf||'',
      m, mn,
      m===0?'KRİTİK':m<mn?'UYARI':'NORMAL'
    ]);
  });
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:18},{wch:40},{wch:14},{wch:14},{wch:14},{wch:14},{wch:12},{wch:10},{wch:12},{wch:12},{wch:10},{wch:10},{wch:8}];
  XLSX.utils.book_append_sheet(wb, ws, tip==='siparis'?'Siparis_Listesi':'Tum_Stok');
  const fn = (tip==='siparis'?'Siparis_Listesi':'Stok_Raporu') + '_' + new Date().toLocaleDateString('tr-TR').replace(/\./g,'-') + '.xlsx';
  XLSX.writeFile(wb, fn);
  toast('✓ ' + fn + ' indirildi!', 'ok');
}

// ── TOAST ──
let toastT;
function toast(msg, tip='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (tip?' '+tip:'');
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove('show'), 3000);
}
</script>
